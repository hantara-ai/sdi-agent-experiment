
name: run-sdi

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ SDI directement ici
      - name: Load SDI text
        id: load_sdi
        run: |
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat << 'SDI' >> $GITHUB_OUTPUT
Ceci est mon texte SDI intégré directement
dans le workflow YAML.
Tu peux écrire autant de lignes que tu veux.
Aucune limite.
Aucun risque d'erreur EOF.
SDI
          echo "EOF" >> $GITHUB_OUTPUT

      # ✅ Vérification API key
      - name: Validate Anthropic API Key
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [[ -z "$KEY" ]]; then
            echo "❌ ERROR: ANTHROPIC_API_KEY missing"
            exit 1
          fi

          if [[ "$KEY" == *$'\n'* ]]; then
            echo "❌ ERROR: API key contains a newline!"
            exit 1
          fi

          echo "✅ API key looks valid."

      # ✅ Appel Claude
      - name: Call Claude API
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python << 'EOF'
          import os, json, requests, sys

          API_KEY = os.environ["ANTHROPIC_API_KEY"].strip()

          url = "https://api.anthropic.com/v1/messages"
          headers = {
              "x-api-key": API_KEY,
              "anthropic-version": "2023-06-01",
              "content-type": "application/json"
          }

          instructions = """${{ steps.load_sdi.outputs.content }}"""

          payload = {
              "model": "claude-3-5-sonnet-latest",
              "max_tokens": 8000,
              "messages": [
                  {"role": "user", "content": instructions}
              ]
          }

          response = requests.post(url, headers=headers, json=payload)
          if response.status_code != 200:
              print("❌ Claude API error:", response.status_code, response.text)
              sys.exit(1)

          data = response.json()
          output = data["content"][0]["text"]

          # Extraction CSV
          csv_start = output.find("```csv")
          csv_end = output.find("```", csv_start + 5)
          csv_content = output[csv_start + 6:csv_end].strip() if csv_start != -1 else ""

          # Extraction rapport
          report_start = output.find("```", csv_end + 3)
          report_end = output.find("```", report_start + 3)
          report_content = output[report_start + 3:report_end].strip() if report_start != -1 else ""

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"csv<<EOF\n{csv_content}\nEOF\n")
              f.write(f"report<<EOF\n{report_content}\nEOF\n")

          print("✅ Claude call OK.")
          EOF

      # Output files
      - name: Save CSV output
        run: |
          echo "${{ steps.claude.outputs.csv }}" > output.csv

      - name: Save Report output
        run: |
          echo "${{ steps.claude.outputs.report }}" > report.txt
