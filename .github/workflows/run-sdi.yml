
name: run-sdi

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load SDI file
        id: load_sdi
        run: |
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat sdi.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ✅ Vérification du secret
      - name: Validate Anthropic API Key
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "🔍 Checking key format..."
          if [[ -z "$KEY" ]]; then
            echo "❌ ERROR: ANTHROPIC_API_KEY is empty!"
            exit 1
          fi

          if [[ "$KEY" == *$'\n'* ]]; then
            echo "❌ ERROR: API key contains a newline!"
            exit 1
          fi

          if [[ "$KEY" != sk-ant-* ]]; then
            echo "⚠️ WARNING: Key does not start with sk-ant- (Anthropic format)"
          fi

          echo "✅ Key format looks good."

      - name: Run Claude API
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python << 'EOF'
          import os, json, requests, sys

          # ✅ Nettoyage de sécurité
          API_KEY = os.environ["ANTHROPIC_API_KEY"].strip().replace("\n", "").replace("\r", "")

          url = "https://api.anthropic.com/v1/messages"
          headers = {
              "x-api-key": API_KEY,
              "anthropic-version": "2023-06-01",
              "content-type": "application/json"
          }

          instructions = """${{ steps.load_sdi.outputs.content }}"""

          payload = {
              "model": "claude-3-5-sonnet-latest",
              "max_tokens": 8000,
              "messages": [
                  {"role": "user", "content": instructions}
              ]
          }

          try:
              response = requests.post(url, headers=headers, json=payload)
          except Exception as e:
              print("❌ Request error:", e)
              sys.exit(1)

          if response.status_code != 200:
              print("❌ API returned an error:", response.status_code, response.text)
              sys.exit(1)

          data = response.json()
          full_output = data["content"][0]["text"]

          # ✅ Extraction CSV
          csv_start = full_output.find("```csv")
          csv_end = full_output.find("```", csv_start + 5)
          csv_content = full_output[csv_start + 6:csv_end].strip() if csv_start != -1 else ""

          # ✅ Extraction rapport
          report_start = full_output.find("```", csv_end + 3)
          report_end = full_output.find("```", report_start + 3)
          report_content = full_output[report_start + 3:report_end].strip() if report_start != -1 else ""

          # ✅ Export dans GITHUB_OUTPUT
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"csv<<EOF\n{csv_content}\nEOF\n")
              f.write(f"report<<EOF\n{report_content}\nEOF\n")

          print("✅ Claude API call successful.")
          EOF

      - name: Save CSV output
        run: |
          echo "${{ steps.claude.outputs.csv }}" > output.csv
          echo "✅ CSV saved to output.csv"

      - name: Save report output
        run: |
          echo "${{ steps.claude.outputs.report }}" > report.txt
          echo "✅ Report saved to report.txt"
